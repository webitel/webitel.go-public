name: Deploy (webitel-core)

run-name: "${{ inputs.commit-message }}"

on:
  workflow_dispatch:
    inputs:
      commit-message:
        type: string
        required: true
        description: Latest commit message to include in run name.

      triggered-branch:
        type: string
        required: true
        description: Triggered branch from original repository to calculate latest version.

      repository-environment:
        type: string
        required: true
        description: Linked environment for upload build to repository (eg. acceptance, v25.04-releases, ...).

      artifact-actions-run-id:
        type: string
        required: false
        description: |
          The id of the workflow run where the desired download artifact was uploaded from.
          If artifact-github-token is specified, this is the run that artifacts will be downloaded from.

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    uses: webitel/reusable-workflows/.github/workflows/_deploy.yml@v2
    secrets: inherit
    with:
      triggered-branch: ${{ inputs.triggered-branch }}
      repository-environment: ${{ inputs.repository-environment }}
      deb-package-pattern: "webitel-core*.deb"
      github-app-client-id: ${{ vars.DELIVERY_BOT_CLIENT_ID }}
      artifact-repository-owner: ${{ github.repository_owner }}
      artifact-repository: webitel.go
      artifact-actions-run-id: ${{ inputs.artifact-actions-run-id }}
